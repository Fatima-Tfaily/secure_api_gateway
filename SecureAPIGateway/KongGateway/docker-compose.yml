services:
  secure-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: secure-api
    restart: always
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AiServiceSettings__BaseUrl: http://ai-service:5001
      AiServiceSettings__AnalyzeEndpoint: /api/analyze
      AiServiceSettings__TimeoutSeconds: 5
    depends_on:
      - ai-service

  ai-service:
    build: ../AiService
    container_name: ai-service
    restart: always
    ports:
      - "5001:5001"

  kong-database:
    image: postgres:13
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5432:5432"

  kong-migrations:
    image: kong:latest
    container_name: kong-migrations
    restart: on-failure
    command: kong migrations bootstrap
    depends_on:
      - kong-database
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: kong

  kong:
    image: kong:latest
    container_name: kong
    restart: always
    depends_on:
      - kong-database
      - kong-migrations
      - secure-api
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8088:8000"
      - "8001:8001"

  kong-setup:
    image: curlimages/curl:latest
    container_name: kong-setup
    depends_on:
      - kong
      - secure-api
    restart: "no"
    command:
      - sh
      - -c
      - |
        sleep 20

        curl -i -X POST http://kong:8001/services \
          --data name=secure-api-service \
          --data url=http://secure-api:8080 || true

        curl -i -X POST http://kong:8001/services/secure-api-service/routes \
          --data name=secure-api-route \
          --data 'paths[]=/' || true